<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>linkados</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: rgb(255, 0, 0);
            text-decoration: none;
        }
        a:visited{
            color: blueviolet;
        }
        a:hover{
            color: burlywood;
           text-decoration: underline ;

        }
        a:active{
            color: rgb(19, 6, 31);
        }
        a::after{
            content:" ⥲";
        }

    </style>
</head>
<body>
    <h1>links parudos</h1>
    <ul>
        <li><a href="https://github.com/gustavoguanabara/html-css/blob/master/aulas-pdf/15%20-Seletores%20personalizados.pdf" target="_blank">gustavo guanabara</a></li>
        <li><a href="https://www.youtube.com/" target="_blank">youtube</a></li>
        <li><a href="https://www.iana.org/assignments/media-types/media-types.xhtml" target="_blank">midia types</a></li>
    
    </ul>
</body>
</html>
