<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hover</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        div:hover{
            color: blue;
        }
        div > p{
            display: none;
        }
        div:hover>p{
            display: block;
            color: aqua;
            background-color: rgb(3, 99, 99);
        }
    </style>
</head>
<body>
    <p>passe aqui</p>
    <div>
        nao passe aqui
        <p>texto exploit
        </p>
    </div>
</body>
</html>
