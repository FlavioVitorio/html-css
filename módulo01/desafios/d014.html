<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notas dos alunos</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 400px;
            border-collapse: collapse;
        }
        thead>tr>th{
            border: 1px solid black;
        }
        thead{
            background-color: lightgray;
        }
        th,td{
            border:1px solid black;
            padding: 10px;
        }
        .justy{
            background-color: lightgray;
            text-align: justify;
        }
        .num{
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Área</th>
                <th rowspan="2" scope="col">disciplinas</th>
                <th colspan="2" scope="colgroup">notas</th>
                <th rowspan="2" scope="col">média</th>
            </tr>
            <tr>                
                <th scope="col">nota1</th>
                <th scope="col">nota2</th></tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup" >Exatas</th>
                <td>Matematica</td>
                <td class="num">0</td>
                <td class="num">0</td>
                <td class="num">0</td>
            </tr>
            <tr>
                <td>fisica</td>
                <td class="num">0</td>
                <td class="num">0</td>
                <td class="num">0</td>
            </tr>
            <tr>
                <td>quimica</td>
                <td class="num">0</td>
                <td class="num">0</td>
                <td class="num">0</td>
            </tr>
            <tr>
                <td>biologia</td>
                <td class="num">0</td>
                <td class="num">0</td>
                <td class="num">0</td>
            </tr>
                <tr class="justy">
                    <th colspan="4" scope="row">media de exatas</th>
                    <td  class="num">0</td>
                </tr>
            <tr>
                <th rowspan="2" scope="rowgroup">Humanas</th>
                <td>história</td>
                <td class="num">0</td>
                <td class="num">0</td>
                <td class="num">0</td>
            </tr>
            <tr>
                <td>geografia</td>
                <td class="num">0</td>
                <td class="num">0</td>
                <td class="num">0</td>
            </tr>
        </tbody>
        <tfoot class="justy">
            <th colspan="4" scope="row">Média de humanas</th>
            <td  class="num">0</td>
        </tfoot>
            
</body>
</html>
